autoware_system_design_format: v0.1.0

name: NebulaHesaiPandar128E4X_decode.node

base: NebulaHesaiPandar128E4X.node

override:
  inputs:
  - name: pandar_packets
    message_type: pandar_msgs/msg/PandarScan
    remap_target: "pandar_packets"
  processes:
  - name: decoder
    trigger_conditions:
    - from_input: pandar_packets
    outcomes:
    - to_output: pandar_points
  parameters:
  - name: launch_hw
    type: bool
    default: false

remove:
  outputs:
  - name: pandar_packets
  processes:
  - name: hw_interface
